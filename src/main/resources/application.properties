spring.application.name=mmw
server.port=8081
spring.datasource.url=jdbc:mysql://localhost:3306/mmw_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${LOCAL_DB_USERNAME:root}
spring.datasource.password=${LOCAL_DB_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent
#gemini.api.url=https://generativelanguage.googleapis.com